name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ensure-release:
    if: github.event.deleted != true
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --title "$TAG_NAME" --generate-notes

  build:
    if: github.event.deleted != true
    needs: ensure-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            build_command: pnpm exec electron-builder --mac --publish never
          - os: windows-2022
            build_command: pnpm exec electron-builder --win --publish never
          - os: ubuntu-24.04
            build_command: pnpm exec electron-builder --linux AppImage deb --publish never

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm run build

      - name: Build release artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: ${{ matrix.build_command }}

      - name: Upload artifacts to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          files=()
          while IFS= read -r file; do
            files+=("$file")
          done < <(find dist -maxdepth 1 -type f ! -name 'builder-*.yml' | sort)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found in dist/"
            exit 1
          fi

          gh release upload "$TAG_NAME" "${files[@]}" --clobber

  update-homebrew-tap:
    if: github.event.deleted != true
    needs: build
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve tap settings
        id: tap
        shell: bash
        run: |
          repository="${HOMEBREW_TAP_REPOSITORY:-bee1an/homebrew-ilovecodex}"
          echo "repository=$repository" >> "$GITHUB_OUTPUT"

          if [ -n "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "HOMEBREW_TAP_TOKEN is not set; skipping Homebrew tap update."
          fi

      - name: Download macOS DMG asset
        if: steps.tap.outputs.enabled == 'true'
        id: asset
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p .release-assets
          gh release download "$TAG_NAME" --pattern "ilovecodex-*.dmg" --dir .release-assets

          asset_path="$(find .release-assets -maxdepth 1 -type f -name '*.dmg' | head -n1)"
          if [ -z "$asset_path" ]; then
            echo "Failed to locate a DMG asset in the GitHub release."
            exit 1
          fi

          asset_name="$(basename "$asset_path")"
          sha256="$(sha256sum "$asset_path" | awk '{print $1}')"

          echo "name=$asset_name" >> "$GITHUB_OUTPUT"
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"

      - name: Clone Homebrew tap repository
        if: steps.tap.outputs.enabled == 'true'
        shell: bash
        env:
          TAP_REPOSITORY: ${{ steps.tap.outputs.repository }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${TAP_REPOSITORY}.git" .homebrew-tap

      - name: Render Homebrew cask
        if: steps.tap.outputs.enabled == 'true'
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
          DMG_NAME: ${{ steps.asset.outputs.name }}
          DMG_SHA256: ${{ steps.asset.outputs.sha256 }}
          REPOSITORY: ${{ github.repository }}
        run: |
          VERSION="${TAG_NAME#v}"
          URL="https://github.com/${REPOSITORY}/releases/download/${TAG_NAME}/${DMG_NAME}"

          node scripts/release/render-homebrew-cask.mjs \
            --version "$VERSION" \
            --sha256 "$DMG_SHA256" \
            --url "$URL" \
            --output ".homebrew-tap/Casks/ilovecodex.rb"

      - name: Commit and push Homebrew cask update
        if: steps.tap.outputs.enabled == 'true'
        shell: bash
        working-directory: .homebrew-tap
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if git diff --quiet -- Casks/ilovecodex.rb; then
            echo "Homebrew cask is already up to date."
            exit 0
          fi

          VERSION="${TAG_NAME#v}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/ilovecodex.rb
          git commit -m "Update ilovecodex to ${VERSION}"
          git push origin HEAD
