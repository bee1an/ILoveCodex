name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ensure-release:
    if: github.event.deleted != true
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --title "$TAG_NAME" --generate-notes

  build:
    if: github.event.deleted != true
    needs: ensure-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            build_command: pnpm exec electron-builder --mac --publish never
          - os: windows-2022
            build_command: pnpm exec electron-builder --win --publish never
          - os: ubuntu-24.04
            build_command: pnpm exec electron-builder --linux AppImage deb --publish never

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm run build

      - name: Build release artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: ${{ matrix.build_command }}

      - name: Upload artifacts to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mapfile -d '' files < <(find dist -maxdepth 1 -type f ! -name 'builder-*.yml' -print0 | sort -z)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found in dist/"
            exit 1
          fi

          gh release upload "$TAG_NAME" "${files[@]}" --clobber
